name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vlang/setup-v@v1.4
        with:
          stable: true

      - name: Install C toolchain and Boehm GC
        run: sudo apt-get update && sudo apt-get install -y build-essential libgc-dev

      - name: Test veetest
        run: v -cc gcc test .
